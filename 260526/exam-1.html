<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>형성 퀴즈 1</title>
    <style>
      /* 1. 전체 선택자 */
      * {
        margin: 1%;
        padding: 0;
        color: black;
      }

      /* 2. 클래스 선택자 */
      .tea1 {
        background-color: beige;
      }
      .tea3 {
        background-color: white;
      }

      /* 3. 그룹 선택자 */
      .container {
        background-color: gainsboro;
      }

      /* 4. 태그 선택자 */
      h1 {
        background-color: beige;
      }
      h2 {
        background-color: gainsboro;
      }
      span {
        color: red;
      }

      /* 5. 아이디 선택자 */
      #container {
        background-color: gainsboro;
      }

      /* 6. 하위 선택자 */
      span.kind .tea1 {
        color: blue;
      }

      /* 7. 자식 선택자 (??ㅠㅠ) */
      div > h2 {
        color: red;
      }

      /* 8. 형제 선택자 */
      h2 + p span {
        color: blue;
      }
      .tea2 ~ .tea3 {
        color: red;
      }
      .tea2 ~ .tea3 h3 {
        color: brown;
      }

      /* 9. 인접 선택자 */
      .tea1 p {
        color: green;
      }
      .tea1 + .tea2 p {
        color: green;
      }
      .tea2 + .tea3 p {
        color: green;
      }
    </style>
  </head>
  <body>
    <h1>건강한 하루</h1>

    <div id="container">
      <h2>건강해지는 차</h2>

      <p>
        머리와 피부에 좋은 차는 어떤 것들일까.
        <span class="kind">차의 종류</span>에 대해 알아보도록 합니다
      </p>

      <ul>
        <li class="tea1">
          <h3>대나무차<span>15,000원</span></h3>
          <p>얼굴에 물을 주는 효과가 있다.</p>
        </li>

        <li class="tea2">
          <h3>감잎차<span>14,000원</span></h3>
          <p>빈혈있는 사람에게 효과가 있다.</p>
        </li>

        <li class="tea3">
          <h3>결명자차<span>20,000원</span></h3>
          <p>눈을 밝혀주는 효과가 있다. <br />보리차와 비슷하나 맛이 더 은은하고 구수하다.</p>
        </li>
      </ul>
    </div>
    
    <!-- 아 너무 어려웠어요 -->
  </body>
</html>
