<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ex 3.6.3</title>
  </head>
  <body>
    <p>신장 (cm) : <input type="number" name="height" id="height" /></p>
    <p>몸무게 (kg) : <input type="number" name="weight" id="weight" /></p>
    <button onclick="check()">결과 보여주세요!</button>
    <hr />
    <p id="result"></p>

    <script>
      /* function check() {
        const h = height.value; // 사용자가 입력한 키
        const w = weight.value; // 사용자가 입력한 몸무게

        console.log(h);
        console.log(w);

        const ideal = (h - 100) * 0.9;
        result.textContent = w >= ideal ? "적정 몸무게 이상" : "적정 몸무게 미달";
      } */
      // #속성이 있는 요소는 변수로 사용 가능 => 권장 X

      function check() {
        const h = height.value;
        const w = weight.value;
        const ideal = (h - 100) * 0.9;
        if (w > ideal) {
          result.textContent = "적정 몸무게 이상";
        }
        if (w == ideal) {
          result.textContent = "적정 몸무게, 좋아요!";
        }
        if (w < ideal) {
          result.textContent = "적정 몸무게 미달";
        }
      }

      /* 연산자 우선 순위
      1. "소괄호" [ () ]
      2. "단항 연산자" [ --, ++, ! ]
      3. "산술 연산자" [ _, /, %, +, -]
      4. 비교 연산자 [>, >=, <, <=, ==, ===, !==]
      5. 논리 연산자 [&&, ||]
      6. 대입 (복합 대입) 연산자 [=, +=, -+, _=, /=, %=] */
    </script>
  </body>
</html>
