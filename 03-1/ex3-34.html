<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>이벤트</title>
  </head>

  <body>
    <button class="b1" onclick="console.log('Button clicked!')">click</button>
    <hr />
    <button class="b2">click</button>
    <hr />
    <button class="b3">click</button>
  </body>

  <script>
    document.querySelector(".b2").onclick = function () {
      console.log("😁 Button clicked!");
    };
  </script>

  <script>
    document.querySelector(".b3").addEventListener("click", function () {
      console.log("🍘 Button clicked! 🥴");
    });
  </script>

</html>
