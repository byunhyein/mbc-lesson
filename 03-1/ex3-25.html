    <script>
      const input = prompt("숫자를 입력하세요");

      switch (Number(input) % 2) {
        case 0:
          alert("짝수 입니다.");
          break;

        case 1:
          alert("홀수 입니다.");
          break;

        default:
          alert("숫자가 아닙니다.");
          break;
      }
    </script>
