<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>나혼자 ex 3.6.3</title>
  </head>
  <body>
    <script>
      let height = Number(prompt("당신의 신장은?", "165"));
      let weight = Number(prompt("당신의 몸무게는?", "60"));

      weight >= (height - 100) * 0.9 ? document.write("<h1>적정 몸무게 이상</h1>") : document.write("<h1>적정 몸무게 미달</h1>");

      // 이상해ㅠㅠ
      // 당연히 이상하지;;;
    </script>
  </body>
</html>
