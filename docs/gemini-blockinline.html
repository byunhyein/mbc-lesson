<!DOCTYPE html>
<html>
<head>
    <title>HTML 친구들 공부하기</title>
    <style>
        /* 블록 친구는 빨간색 테두리 */
        .block-box { border: 5px solid red; margin-bottom: 10px; padding: 10px; }
        /* 인라인 친구는 파란색 테두리 */
        .inline-box { border: 3px solid blue; padding: 5px; }
    </style>
</head>
<body>

    <h1>🏠 HTML 나라의 두 친구</h1>

    <div class="block-box">
        <h2>나는 블록 레벨!</h2>
        <p>나는 욕심쟁이라서 이 한 줄을 다 차지할 거야. 내 옆으로 오지 마!</p>
    </div>

    <div class="block-box">
        <span class="inline-box">나는 인라인 1번</span>
        <span class="inline-box">나는 인라인 2번</span>
        <span class="inline-box">나란히 앉자!</span>
        <p>인라인 친구들은 위처럼 서로 옆에 찰싹 붙어있을 수 있어!</p>
    </div>

</body>
</html>
