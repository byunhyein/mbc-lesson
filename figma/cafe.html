<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAFEIN - Grand Opening</title>
    <link rel="stylesheet" href="cafe.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Besley:wght@700&family=Inter:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="card-container">
        <!-- 배경 이미지 -->
        <div class="image-layer">
            <img src="https://www.figma.com/api/mcp/asset/af1ed9f9-0520-4a82-a6e9-caf5f0de269e" alt="Cafe Background">
        </div>

        <!-- 콘텐츠 오버레이 -->
        <div class="content-overlay">
            
            <!-- 상단 헤더: 디바이더 제거 후 통합 -->
            <div class="header-section">
                <div class="header-left">
                    <span class="text-label">GRAND OPENING</span>
                </div>
                <div class="header-right">
                    <div class="location-box">
                        <img src="https://www.figma.com/api/mcp/asset/5b188682-5f4d-4a4c-a8ac-dc0958464b4c" alt="Location Icon" class="icon-small">
                        <span class="text-label">SEONGSU, KOREA</span>
                    </div>
                </div>
            </div>

            <!-- 중앙 타이틀 -->
            <div class="main-body">
                <div class="title-group">
                    <h1 class="main-title">CAFEIN</h1>
                    <p class="slogan">한 잔의 커피, 그 이상의 머무름</p>
                </div>
            </div>

            <!-- 하단 푸터 -->
            <div class="footer-section">
                <span class="text-label">OPENING JUNE 29 AT 8AM</span>
            </div>

        </div>
    </div>
</body>
</html>
