<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이미지 태그</title>
</head>
<body>
    <!-- alt 속성의 3가지 용법
     1. 접근성 향상 : 
     2. 대체 텍스트
     3. SEO 향상
       --> 
     <!-- 태그가 웹 페이지에서 표시될 때 두 개로 분류된다.
      1. 블록 레벨 : 아래로 표시 (줄바꿈 됨)
      2. 인라인 레벨 : 옆으로 표시
       -->
    <img src="img/14.png" alt="말티즈 강아지가 분홍색 리본으로 머리를 묶고 잔디 밭에서 헥헥거리고 노는 사진"> <hr>
    <img src="img/source.gif" alt="분홍색 꽃무늬 드레스를 입은 아기 강아지가 손을 흔들며 인사하는 gif 이미지"> <br>
    <img src="img/200w.gif" alt="엄마 토끼가 아기 토끼에게 딸기를 먹여주고 있는 gif 이미지" width="400">

    
</body>
</html>
