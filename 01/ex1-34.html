<!doctype html>
<html lang="ko">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>div 연습</title>
    <!-- 웹 표준 HTML5, CSS3, ES6 -->

      .wrap {
        width: 300px;
        margin: auto;
        background-color: lightblue;
      }

      section,
      footer {
        border: 1px solid;

    <!-- header + section + footer -->

      <header>헤더</header>
      <section>
        <h2>semantic tag</h2>
        섹션
      </section>
      <footer>푸터</footer>
    </div>
  </body>
