<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* 1. internel : 내부 스타일 시트 */
        h1{color: red;}
    </style>
    <!-- 3. externel : 외부 스타일 시트 -->
     <link rel="stylesheet" href="./style.css">
</head>
<body>
    <h1>CSS를 적용하는 방법</h1>
    <!-- 2. inline : 쓰면 안 됨 -->
    <h1 style="color:blue">CSS를 적용하는 방법</h1>
    <h2>css 문서에 다른 css 문서를 연결하기 : @import</h2>
    
</body>
