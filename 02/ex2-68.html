<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>align-items</title>
    <style>
      .container {
        width: 100%;
        height: 150px;
        display: flex;
        justify-content: flex-start; /* 주축 정렬 방법 - 시작점 기준 */
        background-color: #eee;
        border: 1px solid #222;
        margin-bottom: 20px;
      }
      .box {
        padding: 5px 45px;
        margin: 5px;
        width: 80px;
      }
      .box:nth-child(odd) {
        background-color: rgb(255, 187, 0);
      }
      .box:nth-child(even) {
        background-color: rgb(35, 220, 35);
      }
      p {
        text-align: center;
        font-weight: bold;
      }

      /* #opt4 베이스라인 정렬을 보이기 위한 글자 크기 차이 */
      #opt4 .box:nth-child(2) p {
        font-size: 14px;
      }
      #opt4 .box:nth-child(3) p {
        font-size: 25px;
      }
      #opt4 .box:nth-child(4) p {
        font-size: 10px;
      }

      /* 교차축 정렬 방법을 지정하는 #opt1 ~ #opt5 스타일 만들기 */
      /* justify : 주축 / align : 교차축 */

      #opt1 {
        align-items: flex-start;
        /* 박스 높이가 작아짐! */

        align-items: normal;
        /* 기본값으로 되돌릴 때는 normal */
      }
      #opt2 {
        align-items: flex-end;
      }
      #opt3 {
        align-items: center;
      }
      #opt4 {
        align-items: baseline;
        /* 문자 기준선에 수직 정렬이 맞도록 */
      }
      #opt5 {
        align-items: stretch;
        /* normal 과 같다! */
      }
    </style>
  </head>
  <body>
    <div class="container" id="opt1">
      <div class="box"><p>1</p></div>
      <div class="box"><p>2</p></div>
      <div class="box"><p>3</p></div>
      <div class="box"><p>4</p></div>
    </div>
    <div class="container" id="opt2">
      <div class="box"><p>1</p></div>
      <div class="box"><p>2</p></div>
      <div class="box"><p>3</p></div>
      <div class="box"><p>4</p></div>
    </div>
    <div class="container" id="opt3">
      <div class="box"><p>1</p></div>
      <div class="box"><p>2</p></div>
      <div class="box"><p>3</p></div>
      <div class="box"><p>4</p></div>
    </div>
    <div class="container" id="opt4">
      <div class="box"><p>1</p></div>
      <div class="box"><p>2</p></div>
      <div class="box"><p>3</p></div>
      <div class="box"><p>4</p></div>
    </div>
    <div class="container" id="opt5">
      <div class="box"><p>1</p></div>
      <div class="box"><p>2</p></div>
      <div class="box"><p>3</p></div>
      <div class="box"><p>4</p></div>
    </div>
  </body>
</html>
