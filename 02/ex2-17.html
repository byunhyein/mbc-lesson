<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pseudo</title>
    <style>
      li {
        background-color: lightgray;
        margin-bottom: 20px;
        font-size: 20px;
      }
      a {
        color: black;
        text-decoration: none;
      }
      a:hover {
        color: yellow;
      }
      ul {
        list-style-type: disc;
      }
    </style>

    <style>
      li:nth-child(4) {
        background-color: beige;
      }
      li:last-child,
      li:last-child a {
        color: red;
      }
      li {
        list-style-type: none;s
      }
    </style>

    <style>
      li::first-letter {
        font-size: 32px;
      }
      li::before {
        content: "🎇";
      }
      li:hover::after {content: "🎆";}
    </style>
  </head>
  <body>
    <ul>
      <li><a href="#">COMPANY</a></li>
      <li><a href="#">PRODUCT</a></li>
      <li><a href="#">SERVICE</a></li>
      <li><a href="#">COMMUNITY</a></li>
    </ul>
    <p>항목을 선택해주세요.</p>
  </body>
</html>
